name: three_question_journal
description: A simple daily journaling app with 3 evening prompts
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local storage
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2

  # State management
  provider: ^6.1.1

  # Local notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Date handling
  intl: ^0.19.0

  # In-app purchases
  in_app_purchase: ^3.1.13

  # UI
  google_fonts: ^6.1.0
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
