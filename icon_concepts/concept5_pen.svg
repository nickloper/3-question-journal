<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B5B95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B8CDE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" fill="url(#grad5)"/>

  <!-- Paper/notepad background -->
  <rect x="90" y="120" width="332" height="320" rx="12" fill="white" opacity="0.95"/>

  <!-- Three question marks or checkmarks -->
  <text x="140" y="210" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#6B5B95">✓</text>
  <text x="140" y="290" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#6B5B95">✓</text>
  <text x="140" y="370" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#6B5B95">✓</text>

  <!-- Lines next to checkmarks -->
  <rect x="210" y="190" width="170" height="10" rx="5" fill="#6B5B95" opacity="0.3"/>
  <rect x="210" y="270" width="170" height="10" rx="5" fill="#6B5B95" opacity="0.3"/>
  <rect x="210" y="350" width="170" height="10" rx="5" fill="#6B5B95" opacity="0.3"/>

  <!-- Pen positioned diagonally -->
  <rect x="340" y="80" width="25" height="180" rx="5" fill="#FF6B6B" transform="rotate(45 352 170)"/>
  <polygon points="340,250 352,270 364,250" fill="#2D3748" transform="rotate(45 352 260)"/>
</svg>