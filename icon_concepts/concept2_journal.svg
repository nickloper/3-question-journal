<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B5B95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B8CDE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" fill="url(#grad2)"/>

  <!-- Journal book -->
  <rect x="120" y="100" width="272" height="312" rx="8" fill="white" opacity="0.95"/>

  <!-- Book spine line -->
  <rect x="140" y="100" width="8" height="312" fill="#6B5B95" opacity="0.3"/>

  <!-- Three horizontal lines representing questions -->
  <rect x="170" y="170" width="190" height="12" rx="6" fill="#6B5B95" opacity="0.7"/>
  <rect x="170" y="240" width="190" height="12" rx="6" fill="#6B5B95" opacity="0.7"/>
  <rect x="170" y="310" width="190" height="12" rx="6" fill="#6B5B95" opacity="0.7"/>

  <!-- Small "3" badge -->
  <circle cx="380" cy="120" r="45" fill="#FF6B6B"/>
  <text x="380" y="145" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="white" text-anchor="middle">3</text>
</svg>