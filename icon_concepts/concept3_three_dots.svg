<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B5B95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B8CDE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" fill="url(#grad3)"/>

  <!-- Three circles in a vertical arrangement -->
  <circle cx="256" cy="140" r="55" fill="white" opacity="0.9"/>
  <circle cx="256" cy="256" r="55" fill="white" opacity="0.9"/>
  <circle cx="256" cy="372" r="55" fill="white" opacity="0.9"/>

  <!-- Optional: small dots inside circles -->
  <circle cx="256" cy="140" r="20" fill="#6B5B95"/>
  <circle cx="256" cy="256" r="20" fill="#6B5B95"/>
  <circle cx="256" cy="372" r="20" fill="#6B5B95"/>
</svg>